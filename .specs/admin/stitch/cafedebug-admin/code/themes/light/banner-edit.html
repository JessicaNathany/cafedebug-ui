<!DOCTYPE html><html lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Banner Editor - CafeDebug</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Cabinet+Grotesk:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f56e3d",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Cabinet Grotesk", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(0, 0, 0, 0.04)',
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Cabinet Grotesk', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined[data-weight="fill"] { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body class="bg-background-light text-slate-900 antialiased min-h-screen flex flex-col">
<!-- Header / Back Navigation -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-20 px-6 py-4 flex items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<a class="text-slate-500 hover:text-slate-900 transition-colors p-2 rounded-full hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</a>
<div class="flex flex-col">
<span class="text-xs font-semibold text-slate-500 uppercase tracking-wider font-display">Banners</span>
<span class="text-sm font-medium text-slate-900">Editing Banner<br></span>
</div>
</div>
<div class="flex items-center gap-3">
<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-amber-100 text-amber-800">
<span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                Draft
            </span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col md:flex-row max-w-[1600px] w-full mx-auto pb-24">
<!-- Left Column (Main Editor) -->
<div class="w-full md:w-[60%] lg:w-[68%] p-6 md:p-8 lg:p-12 flex flex-col gap-8">
<!-- Title Input -->
<div class="group relative">
<input class="w-full bg-transparent border-0 border-b-2 border-transparent hover:border-slate-200 focus:border-primary focus:ring-0 text-3xl md:text-4xl lg:text-5xl font-display font-bold text-slate-900 placeholder:text-slate-300 transition-colors py-2 px-0 shadow-none outline-none" placeholder="Livro Carreira Dev" type="text" value="Building Scalable Design Systems">
</div>
<!-- Markdown Editor -->
</div>
<!-- Right Column (Sidebar/Form) -->
<div class="w-full md:w-[40%] lg:w-[32%] bg-white border-l border-slate-200 p-6 md:p-8 flex flex-col gap-8 shadow-[-4px_0_24px_-12px_rgba(0,0,0,0.05)] overflow-y-auto">
<!-- Cover Artwork -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-slate-900 font-display">Cover Artwork</label>
<div class="group relative aspect-square w-full max-w-[240px] mx-auto bg-slate-50 rounded-xl border-2 border-dashed border-slate-200 overflow-hidden flex flex-col items-center justify-center text-slate-400 hover:border-primary/50 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-4xl mb-2" data-icon="image">image</span>
<span class="text-xs font-medium">Click to upload cover</span>
<p class="text-[10px] text-slate-400 mt-1">3000x3000px JPG/PNG</p>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file">
</div>
</div>
<!-- Audio URL -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 font-display" for="audio-url">URL</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]" data-icon="link">link</span>
</div>
<input class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="audio-url" placeholder="https://example.com/banner-link..." type="text">
</div>
</div>
<!-- Category -->
<!-- Publish Date -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 font-display" for="publish-date">Start Date</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]" data-icon="calendar_today">calendar_today</span>
</div>
<input class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-900 focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="publish-date" type="datetime-local" value="2023-10-24T08:00">
</div>
</div><div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 font-display" for="end-date">End Date</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]" data-icon="calendar_today">calendar_today</span>
</div>
<input class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-900 focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="end-date" type="datetime-local">
</div>
</div>
<!-- Tags -->
</div>
</main>
<!-- Sticky Footer Actions -->
<div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 p-4 z-30 shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
<div class="max-w-[1600px] mx-auto flex items-center justify-between px-2 md:px-4">
<button class="text-sm font-medium text-slate-500 hover:text-slate-900 px-4 py-2 rounded-lg hover:bg-slate-100 transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
                Cancel
            </button>
<div class="flex items-center gap-3">
<button class="px-5 py-2.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all font-display shadow-sm" type="button">
                    Save Draft
                </button>
<button class="px-6 py-2.5 text-sm font-medium text-white bg-primary rounded-lg hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all font-display shadow-sm flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
                    Publish
                </button>
</div>
</div>
</div>


</body></html>
